<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Facebook Demo</title>
  </head>
  <body>
    <section class="facebookdemo">
      <img src="image/todo.jpg" alt="" />
      <div class="container">
        <div class="text-items">
          <div class="content-header">
            <div class="image">
              <img src="image/todo.jpg" alt="" />
            </div>
            <input class="firstinput" type="text" placeholder="What are you thinking right now?" />
            <div class="icons">
              <i class="fa-solid fa-video"></i>
              <i class="fa-solid fa-photo-film"></i>
              <i class="fa-regular fa-face-grin"></i>
            </div>
          </div>



          <div class="card-items mt-5">
            <div class="Cards">
              <h3>Create post</h3>
              <div class="create-items">
                <img src="image/todo.jpg" alt="" />
                <input class="name" type="text" placeholder="Enter Name" />
              </div>
              <p class="namefield">This field is required</p>
              <p class="number">Number is not allowed</p>
              <input
                class="textarea"
                type="text"
                placeholder="What are you thinking right now?"
              />
              <p class="textfield">This field is required</p>

              <div class="bottom-part">
                <i class="fa-solid fa-photo-film"></i>
                <i class="fa-regular fa-face-grin"></i>
              </div>
              <button class="btn btn-primary post">Post</button>
              <button class="btn btn-success update">Update</button>
            </div>
          </div>


          <div class="post-items mt-5">
           
          </div>
        </div>
      </div>
    </section>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
